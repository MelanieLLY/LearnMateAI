name: AI PR Review (Anthropic API)

on:
  pull_request:
    branches: [ "main" ]
    types: [ "opened", "synchronize", "ready_for_review" ]

permissions:
  pull-requests: write
  contents: read

jobs:
  ai-review:
    name: AI-Powered Code Review via Claude API
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          # Get the diff between base and head
          git diff origin/${{ github.base_ref }}...HEAD > pr.diff
          DIFF_SIZE=$(wc -l < pr.diff)
          echo "diff_size=$DIFF_SIZE" >> $GITHUB_OUTPUT

          # Extract file names changed
          git diff --name-only origin/${{ github.base_ref }}...HEAD > changed_files.txt
          echo "files_changed=$(cat changed_files.txt | tr '\n' ', ')" >> $GITHUB_OUTPUT

      - name: Set up Node.js
        if: steps.diff.outputs.diff_size > 0
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run AI Code Review
        if: steps.diff.outputs.diff_size > 0
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cat > review.js << 'EOF'
          const fs = require('fs');
          const https = require('https');

          const diff = fs.readFileSync('pr.diff', 'utf8');
          const changedFiles = fs.readFileSync('changed_files.txt', 'utf8');

          const systemPrompt = `You are an expert code reviewer for LearnMateAI (full-stack AI tutoring app).

          Review the PR diff with focus on:
          1. **Security** (OWASP Top 10): hardcoded secrets, SQL injection, XSS, CSRF, auth/authz, sensitive data exposure
          2. **Code Quality**: readability, maintainability, performance, adherence to patterns in .claude/rules/
          3. **Test Coverage**: gaps in unit/integration tests
          4. **Project Standards**: consistency with CLAUDE.md, backend patterns, frontend patterns
          5. **CI/CD Compliance**: will this pass Gitleaks, Bandit, npm audit, CodeQL?

          Format your response as a GitHub PR review with:
          - Critical issues (if any) that must be fixed
          - Suggestions for improvement
          - Positive notes on well-written code
          - Summary checklist`;

          const userPrompt = `Review this PR:

          Changed files: ${changedFiles}

          Diff:
          \`\`\`diff
          ${diff}
          \`\`\``;

          const payload = JSON.stringify({
            model: "claude-opus-4-7",
            max_tokens: 2048,
            system: systemPrompt,
            messages: [
              { role: "user", content: userPrompt }
            ]
          });

          const options = {
            hostname: 'api.anthropic.com',
            port: 443,
            path: '/v1/messages',
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Content-Length': payload.length,
              'x-api-key': process.env.ANTHROPIC_API_KEY,
              'anthropic-version': '2023-06-01'
            }
          };

          const req = https.request(options, (res) => {
            let data = '';
            res.on('data', chunk => data += chunk);
            res.on('end', () => {
              try {
                const response = JSON.parse(data);
                const reviewText = response.content[0].text;
                fs.writeFileSync('review-output.md', reviewText);
                console.log('Review generated successfully');
              } catch (err) {
                console.error('Failed to parse API response:', err);
                process.exit(1);
              }
            });
          });

          req.on('error', (err) => {
            console.error('API request error:', err);
            process.exit(1);
          });

          req.write(payload);
          req.end();
          EOF

          node review.js

      - name: Post review as PR comment
        if: steps.diff.outputs.diff_size > 0
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reviewText = fs.readFileSync('review-output.md', 'utf8');

            // Truncate if too long (GitHub comment limit ~65536 chars)
            const truncated = reviewText.length > 60000
              ? reviewText.substring(0, 60000) + '\n\n_Review truncated due to length_'
              : reviewText;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 AI Code Review\n\n${truncated}`
            });

      - name: Auto-label based on findings
        if: steps.diff.outputs.diff_size > 0
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reviewText = fs.readFileSync('review-output.md', 'utf8').toLowerCase();

            const labels = [];

            // Detect security concerns
            if (reviewText.includes('security') || reviewText.includes('owasp') ||
                reviewText.includes('secret') || reviewText.includes('injection')) {
              labels.push('⚠️-security-review');
            }

            // Detect test gaps
            if (reviewText.includes('test') || reviewText.includes('coverage')) {
              labels.push('📋-test-coverage');
            }

            // Detect performance issues
            if (reviewText.includes('performance') || reviewText.includes('slow')) {
              labels.push('🐌-performance');
            }

            // Positive review
            if (reviewText.includes('well-written') || reviewText.includes('good job')) {
              labels.push('✅-approved');
            }

            if (labels.length > 0) {
              github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: labels
              });
            }

      - name: Create PR check status
        if: steps.diff.outputs.diff_size > 0
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reviewText = fs.readFileSync('review-output.md', 'utf8');

            const hasCritical = reviewText.includes('Critical') || reviewText.includes('CRITICAL') ||
                               reviewText.includes('must fix') || reviewText.includes('MUST FIX');

            github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'AI Code Review',
              head_sha: context.payload.pull_request.head.sha,
              status: 'completed',
              conclusion: hasCritical ? 'failure' : 'success',
              output: {
                title: 'Claude AI Review Complete',
                summary: `Review by Claude API. ${hasCritical ? 'Critical issues found.' : 'No critical issues detected.'}`,
                text: reviewText
              }
            });
